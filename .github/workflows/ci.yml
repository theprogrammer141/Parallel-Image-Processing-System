name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libopencv-dev \
            libopenmpi-dev \
            openmpi-bin \
            ocl-icd-opencl-dev \
            opencl-headers \
            pocl-opencl-icd \
            python3 \
            python3-numpy \
            python3-opencv

      - name: Build all binaries
        run: make all

      - name: Run correctness tests
        run: make test
